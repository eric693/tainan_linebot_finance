databases:
  - name: finance-db
    databaseName: finance
    user: finance_user
    plan: free

services:
  - type: web
    name: linebot-finance
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 60
    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: finance-db
          property: connectionString
      # RENDER_EXTERNAL_URL is automatically injected by Render as
      # https://<service-name>.onrender.com — no manual config needed