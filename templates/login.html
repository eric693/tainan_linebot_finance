<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>財務後台 - 登入</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0f1c3a;
    --navy-mid: #1a2d58;
    --navy-light: #243d6e;
    --accent: #4a7bda;
    --accent-hover: #3a6bc8;
    --gold: #c8a96e;
    --bg: #f4f6fa;
    --text: #1e2a45;
    --muted: #8892a4;
    --white: #ffffff;
    --border: #dde3ef;
    --red: #d64242;
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 80%, rgba(74,123,218,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 10%, rgba(200,169,110,0.08) 0%, transparent 55%);
  }

  .login-card {
    position: relative;
    z-index: 1;
    background: var(--white);
    border-radius: 12px;
    padding: 48px 40px;
    width: 400px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.35);
  }

  .brand {
    text-align: center;
    margin-bottom: 36px;
  }

  .brand-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--navy);
    letter-spacing: 0.04em;
  }

  .brand-sub {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .divider {
    width: 40px;
    height: 2px;
    background: var(--gold);
    margin: 12px auto;
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  input[type="password"] {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.15em;
  }

  input[type="password"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(74,123,218,0.12);
    background: var(--white);
  }

  .error-msg {
    font-size: 12px;
    color: var(--red);
    margin-top: 8px;
    padding: 8px 12px;
    background: rgba(214,66,66,0.06);
    border-radius: 6px;
    border-left: 3px solid var(--red);
  }

  button[type="submit"] {
    width: 100%;
    margin-top: 24px;
    padding: 13px;
    background: var(--navy);
    color: var(--white);
    border: none;
    border-radius: 8px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: background 0.2s, transform 0.1s;
  }

  button[type="submit"]:hover { background: var(--navy-light); }
  button[type="submit"]:active { transform: scale(0.98); }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 24px;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<div class="login-card">
  <div class="brand">
    <div class="brand-title">財務管理後台</div>
    <div class="divider"></div>
    <div class="brand-sub">Finance Management System</div>
  </div>
  <form method="POST">
    <label for="pw">管理員密碼</label>
    <input type="password" id="pw" name="password" placeholder="輸入密碼" autofocus autocomplete="current-password">
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}
    <button type="submit">登入</button>
  </form>
  <div class="footer-note">Powered by LINE Bot Financial System</div>
</div>
</body>
</html>
