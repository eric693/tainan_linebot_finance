<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>員工打卡</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #0f1c3a; --accent: #4a7bda;
  --green: #2e9e6b; --green-light: #edfaf4;
  --red: #d64242;   --red-light: #fdf0f0;
  --gold: #c8a96e;
  --orange: #e07b2a; --orange-light: #fef3e8;
  --bg: #f0f2f8; --surface: #fff; --text: #1e2a45; --muted: #8892a4; --border: #dde3ef;
}
html, body { height: 100%; background: var(--navy); font-family: "Noto Sans TC", sans-serif; -webkit-tap-highlight-color: transparent; }
.wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 24px 16px 48px; }
.header { width: 100%; max-width: 420px; text-align: center; margin-bottom: 24px; }
.header-brand { font-size: 11px; letter-spacing: .2em; color: rgba(255,255,255,.3); text-transform: uppercase; margin-bottom: 6px; }
.header-bar { width: 28px; height: 2px; background: var(--gold); margin: 0 auto 18px; }
.clock-time { font-family: "DM Mono", monospace; font-size: 48px; font-weight: 500; color: #fff; letter-spacing: .04em; }
.clock-date { font-size: 13px; color: rgba(255,255,255,.45); margin-top: 6px; }
.card { background: var(--surface); border-radius: 18px; width: 100%; max-width: 420px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,.4); }
.card-body { padding: 28px 24px; }
.gps-bar { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; margin-bottom: 18px; }
.gps-ok      { background: var(--green-light); color: var(--green); }
.gps-warn    { background: var(--orange-light); color: var(--orange); }
.gps-err     { background: var(--red-light);   color: var(--red); }
.gps-loading { background: #eef3fd; color: var(--accent); }
.gps-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-ok   { background: var(--green); }
.dot-warn { background: var(--orange); animation: pulse .8s infinite; }
.dot-err  { background: var(--red); }
.dot-spin { background: var(--accent); animation: pulse .8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
.field-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 6px; }
.field-input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-family: "Noto Sans TC", sans-serif; font-size: 15px; color: var(--text); outline: none; transition: border-color .15s; margin-bottom: 14px; background: #fff; }
.field-input:focus { border-color: var(--accent); }
.login-btn { width: 100%; padding: 14px; border-radius: 10px; border: none; background: var(--navy); color: #fff; font-family: "Noto Sans TC", sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; }
.login-btn:active { opacity: .85; }
.login-err { color: var(--red); font-size: 13px; text-align: center; margin-top: 10px; min-height: 18px; }
.greeting { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 18px; }
.punch-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.punch-btn { padding: 22px 10px; border-radius: 12px; border: none; font-family: "Noto Sans TC", sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; text-align: center; transition: all .12s; }
.punch-btn:active:not(:disabled) { transform: scale(.96); }
.punch-btn:disabled { opacity: .35; cursor: not-allowed; }
.p-sub { font-size: 11px; font-weight: 400; opacity: .75; margin-top: 4px; }
.p-in   { background: var(--green);  color: #fff; }
.p-out  { background: var(--red);    color: #fff; }
.p-bout { background: var(--orange); color: #fff; }
.p-bin  { background: var(--accent); color: #fff; }
.log-section { border-top: 1px solid var(--border); padding: 16px 24px; }
.log-title { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 10px; }
.log-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #f0f2f8; }
.log-item:last-child { border-bottom: none; }
.lb { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
.lb-in   { background: var(--green-light); color: var(--green); }
.lb-out  { background: var(--red-light);   color: var(--red); }
.lb-bout { background: var(--orange-light); color: var(--orange); }
.lb-bin  { background: #eef3fd; color: var(--accent); }
.log-time { font-family: "DM Mono", monospace; font-size: 14px; font-weight: 500; text-align: right; }
.log-sub  { font-size: 10px; color: var(--muted); text-align: right; margin-top: 1px; }
.log-empty { font-size: 13px; color: var(--muted); text-align: center; padding: 8px 0; }
.logout-row { padding: 12px 24px; border-top: 1px solid var(--border); text-align: right; }
.logout-btn { background: transparent; border: none; font-size: 12px; color: var(--muted); cursor: pointer; font-family: "Noto Sans TC", sans-serif; }
.logout-btn:hover { color: var(--red); }
.success-overlay { position: fixed; inset: 0; background: rgba(46,158,107,.93); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; opacity: 0; pointer-events: none; transition: opacity .2s; }
.success-overlay.show { opacity: 1; pointer-events: all; }
.so-name { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 6px; }
.so-type { font-size: 16px; color: rgba(255,255,255,.8); margin-bottom: 6px; }
.so-time { font-family: "DM Mono", monospace; font-size: 44px; color: #fff; font-weight: 500; }
.so-dist { font-size: 13px; color: rgba(255,255,255,.6); margin-top: 8px; }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--red); color: #fff; padding: 12px 22px; border-radius: 10px; font-size: 14px; font-weight: 600; z-index: 999; opacity: 0; pointer-events: none; transition: opacity .2s; max-width: 88vw; text-align: center; white-space: pre-line; }
.toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-brand">財務管理系統</div>
    <div class="header-bar"></div>
    <div class="clock-time" id="clock-time">--:--:--</div>
    <div class="clock-date"  id="clock-date"></div>
  </div>

  <div class="card">
    <!-- Login -->
    <div class="card-body" id="screen-login">
      <div style="font-size:16px;font-weight:700;color:var(--navy);margin-bottom:20px">員工登入</div>
      <div class="field-label">帳號</div>
      <input class="field-input" type="text" id="inp-user" placeholder="請輸入帳號"
        autocomplete="username" autocapitalize="none" spellcheck="false">
      <div class="field-label">密碼</div>
      <input class="field-input" type="password" id="inp-pass" placeholder="請輸入密碼"
        autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="login-btn" onclick="doLogin()" id="login-btn">登入</button>
      <div class="login-err" id="login-err"></div>
    </div>

    <!-- Punch -->
    <div id="screen-punch" style="display:none">
      <div class="card-body" style="padding-bottom:16px">
        <div class="greeting" id="greeting"></div>
        <div class="gps-bar gps-loading" id="gps-bar">
          <div class="gps-dot dot-spin" id="gps-dot"></div>
          <span id="gps-text">正在取得定位...</span>
        </div>
        <div class="punch-grid">
          <button class="punch-btn p-in"   id="btn-in"   onclick="doPunch('in')">
            上班打卡<div class="p-sub">Clock In</div>
          </button>
          <button class="punch-btn p-out"  id="btn-out"  onclick="doPunch('out')">
            下班打卡<div class="p-sub">Clock Out</div>
          </button>
          <button class="punch-btn p-bout" id="btn-bout" onclick="doPunch('break_out')">
            休息開始<div class="p-sub">Break Out</div>
          </button>
          <button class="punch-btn p-bin"  id="btn-bin"  onclick="doPunch('break_in')">
            休息結束<div class="p-sub">Break In</div>
          </button>
        </div>
      </div>
      <div class="log-section">
        <div class="log-title">今日打卡記錄</div>
        <div id="today-log"><div class="log-empty">尚無記錄</div></div>
      </div>
      <div class="logout-row">
        <button class="logout-btn" onclick="doLogout()">登出</button>
      </div>
    </div>
  </div>
</div>

<div class="success-overlay" id="sov">
  <div class="so-name" id="so-name"></div>
  <div class="so-type" id="so-type"></div>
  <div class="so-time" id="so-time"></div>
  <div class="so-dist" id="so-dist"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const DAYS  = ["日","一","二","三","四","五","六"];
const LABEL = { in:"上班打卡", out:"下班打卡", break_out:"休息開始", break_in:"休息結束" };
const LCLS  = { in:"lb-in", out:"lb-out", break_out:"lb-bout", break_in:"lb-bin" };

// Clock
function tick() {
  const n = new Date();
  document.getElementById("clock-time").textContent =
    [n.getHours(),n.getMinutes(),n.getSeconds()].map(x=>String(x).padStart(2,"0")).join(":");
  document.getElementById("clock-date").textContent =
    n.getFullYear()+" / "+(n.getMonth()+1)+" / "+n.getDate()+"（週"+DAYS[n.getDay()]+"）";
}
setInterval(tick,1000); tick();

// State
let me=null, settings=null, gpsPos=null, watchId=null, locked=false;

// Init
(async()=>{
  settings = await apiFetch("/api/punch/settings");
  const r  = await fetch("/api/punch/me");
  if(r.ok){ me=await r.json(); showPunch(); }
  else showLogin();
})();

// Login
function showLogin(){
  document.getElementById("screen-login").style.display="";
  document.getElementById("screen-punch").style.display="none";
}
async function doLogin(){
  const u=document.getElementById("inp-user").value.trim();
  const p=document.getElementById("inp-pass").value;
  const errEl=document.getElementById("login-err");
  const btn=document.getElementById("login-btn");
  errEl.textContent="";
  if(!u||!p){errEl.textContent="請輸入帳號及密碼";return;}
  btn.disabled=true; btn.textContent="登入中...";
  try{
    const r=await fetch("/api/punch/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(!r.ok){errEl.textContent=d.error||"登入失敗";return;}
    me=d;
    document.getElementById("inp-pass").value="";
    showPunch();
  }catch(e){errEl.textContent="網路錯誤，請重試";}
  finally{btn.disabled=false;btn.textContent="登入";}
}

// Punch screen
function showPunch(){
  document.getElementById("screen-login").style.display="none";
  document.getElementById("screen-punch").style.display="";
  const h=new Date().getHours();
  const g=h<10?"早安":h<14?"午安":h<18?"下午好":"晚安";
  document.getElementById("greeting").textContent=g+"，"+me.name;
  loadLog();
  startGPS();
}
async function doLogout(){
  await fetch("/api/punch/logout",{method:"POST"});
  me=null; gpsPos=null;
  if(watchId) navigator.geolocation.clearWatch(watchId);
  showLogin();
}

// GPS
function startGPS(){
  gpsBar("loading","正在取得定位...");
  if(!navigator.geolocation){ gpsBar("err","裝置不支援 GPS"); return; }
  navigator.geolocation.getCurrentPosition(gpsOk,gpsErr,{timeout:12000,enableHighAccuracy:true});
  watchId=navigator.geolocation.watchPosition(gpsOk,gpsErr,{enableHighAccuracy:true,maximumAge:15000,timeout:15000});
}
function gpsOk(pos){
  gpsPos={lat:pos.coords.latitude,lng:pos.coords.longitude};
  const req = settings && settings.gps_required;
  const hasBase = settings && settings.lat;
  if(hasBase){
    const dist=hav(gpsPos.lat,gpsPos.lng,settings.lat,settings.lng);
    const r=settings.radius_m||100;
    if(dist<=r){
      gpsBar("ok","距離打卡地點 "+dist+" 公尺（範圍 "+r+"m）");
      setBtns(false);
    } else {
      gpsBar("warn","距離 "+dist+" 公尺，超出範圍 "+r+"m");
      setBtns(req,"超出打卡範圍");
    }
  } else {
    gpsBar("ok","定位成功");
    setBtns(false);
  }
}
function gpsErr(e){
  if(settings&&settings.gps_required){
    gpsBar("err","無法取得定位，請允許位置權限");
    setBtns(true,"需要定位權限");
  } else {
    gpsBar("warn","未取得定位（非必要）");
    setBtns(false);
  }
}
function gpsBar(type,msg){
  const typeMap={ok:"gps-ok",warn:"gps-warn",err:"gps-err",loading:"gps-loading"};
  const dotMap ={ok:"dot-ok",warn:"dot-warn",err:"dot-err",loading:"dot-spin"};
  document.getElementById("gps-bar").className="gps-bar "+(typeMap[type]||"gps-loading");
  document.getElementById("gps-dot").className="gps-dot "+(dotMap[type]||"dot-spin");
  document.getElementById("gps-text").textContent=msg;
}
function setBtns(disabled,title=""){
  ["btn-in","btn-out","btn-bout","btn-bin"].forEach(id=>{
    const b=document.getElementById(id);
    b.disabled=disabled;
    if(disabled&&title) b.title=title;
  });
}
function hav(a,b,c,d){
  const R=6371000,p=Math.PI/180;
  const x=Math.sin((c-a)*p/2)**2+Math.cos(a*p)*Math.cos(c*p)*Math.sin((d-b)*p/2)**2;
  return Math.round(2*R*Math.asin(Math.sqrt(x)));
}

// Punch
async function doPunch(type){
  if(locked)return;
  locked=true; setTimeout(()=>locked=false,2000);
  const body={punch_type:type};
  if(gpsPos){body.lat=gpsPos.lat;body.lng=gpsPos.lng;}
  try{
    const r=await fetch("/api/punch/clock",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const d=await r.json();
    if(!r.ok){showToast(d.error||"打卡失敗");locked=false;return;}
    const n=new Date();
    const ts=[n.getHours(),n.getMinutes()].map(x=>String(x).padStart(2,"0")).join(":");
    const dist=d.gps_distance!=null?"距離打卡地點 "+d.gps_distance+" 公尺":"";
    showSuccess(me.name,LABEL[type],ts,dist);
    await loadLog();
  }catch(e){showToast("網路錯誤，請重試");locked=false;}
}

// Today log
async function loadLog(){
  const r=await fetch("/api/punch/today");
  const list=await r.json();
  const wrap=document.getElementById("today-log");
  if(!list.length){wrap.innerHTML="<div class="log-empty">尚無打卡記錄</div>";return;}
  wrap.innerHTML=list.map(r=>{
    const t=r.punched_at?r.punched_at.slice(11,16):"";
    const dist=r.gps_distance!=null?r.gps_distance+"m":"";
    return "<div class="log-item">" +
      "<span class="lb "+(LCLS[r.punch_type]||"")+"">"+(LABEL[r.punch_type]||r.punch_type)+"</span>" +
      "<div><div class="log-time">"+t+"</div>" +
      (dist?"<div class="log-sub">"+dist+"</div>":"") +
      (r.is_manual?"<div class="log-sub">補打卡</div>":"") +
      "</div></div>";
  }).join("");
}

// Flash
function showSuccess(name,type,time,dist){
  document.getElementById("so-name").textContent=name;
  document.getElementById("so-type").textContent=type+" 成功";
  document.getElementById("so-time").textContent=time;
  document.getElementById("so-dist").textContent=dist;
  const el=document.getElementById("sov");
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),2400);
}
function showToast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg;
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),3500);
}
async function apiFetch(url){ const r=await fetch(url); return r.json(); }
</script>
</body>
</html>
